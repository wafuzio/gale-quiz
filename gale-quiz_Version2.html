<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>GALE Quiz App</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&family=Roboto:wght@100&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 36px 24px 100px;
    }
    .app-shell { max-width: 980px; margin: 0 auto; }
    .gale-wordmark {
      width: 112px;
      height: auto;
      margin-bottom: 28px;
      display: block;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .ai-copper { color: #FD6453; }
    .gale-a {
      display: inline-block;
      color: #FD6453;
      font-weight: 600;
      letter-spacing: 0.02em;
      position: relative;
      padding-right: 1px;
    }
    .gale-a::after {
      content: '';
      position: absolute;
      left: 1px;
      right: 1px;
      top: 52%;
      height: 1px;
      background: #080808;
      opacity: 0.9;
    }
    .slide-index {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #FD6453;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slide-index::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      background: #FD6453;
    }
    #saveStatus {
      display: none;
    }
    .preview-wrap {
      background: #080808;
      border: 1px solid rgba(255,255,255,0.09);
      padding: clamp(24px, 5vw, 56px);
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }
    .watermark-num {
      position: absolute;
      bottom: 16px;
      right: 24px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(58px, 14vw, 120px);
      color: #fff;
      opacity: 0.05;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    .accent-bar { width: 40px; height: 2px; background: #FD6453; margin-bottom: 18px; }
    .style-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 6vw, 84px);
      letter-spacing: 0.04em;
      line-height: 0.95;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .style-section {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(30px, 4vw, 60px);
      letter-spacing: 0.04em;
      line-height: 0.95;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .style-label-tag {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #FD6453;
      margin-bottom: 10px;
    }
    .style-body {
      font-size: 16px;
      font-weight: 300;
      line-height: 1.65;
      color: rgba(255,255,255,0.95);
      max-width: 760px;
    }
    .option-list {
      margin-top: 24px;
      display: grid;
      gap: 10px;
      max-width: 760px;
    }
    .option-list.usage-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      max-width: 920px;
    }
    .usage-option-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .usage-label {
      flex: 1;
      min-width: 0;
    }
    .usage-label-main { display: block; }
    .usage-label-sub {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      font-style: italic;
      color: rgba(255,255,255,0.72);
      line-height: 1.35;
    }
    .help-wrap {
      position: relative;
      flex: 0 0 auto;
    }
    .help-trigger {
      border: 1px solid rgba(255,255,255,0.26);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.9);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      cursor: help;
      padding: 0;
    }
    .help-popover {
      position: absolute;
      right: 0;
      top: 24px;
      width: min(280px, 72vw);
      border: 1px solid rgba(255,255,255,0.22);
      background: #121212;
      color: rgba(255,255,255,0.92);
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: 0.01em;
      padding: 8px 10px;
      z-index: 30;
      display: none;
      text-transform: none;
    }
    .help-wrap:hover .help-popover,
    .help-wrap:focus-within .help-popover {
      display: block;
    }
    .option-btn,
    .check-item {
      border: 1px solid rgba(255,255,255,0.14);
      background: #101010;
      color: #fff;
      padding: 14px 16px;
      text-align: left;
      font-size: 15px;
      line-height: 1.45;
      transition: border-color 0.2s ease, background-color 0.2s ease;
      cursor: pointer;
      width: 100%;
    }
    .option-btn[aria-pressed="true"],
    .check-item.active {
      border-color: #FD6453;
      background: rgba(253,100,83,0.14);
    }
    .option-btn:hover,
    .check-item:hover {
      border-color: rgba(253,100,83,0.75);
      background: rgba(253,100,83,0.08);
    }
    .check-item input { margin-right: 10px; accent-color: #FD6453; }
    .check-item label { cursor: pointer; display: flex; align-items: flex-start; }
    .nav-row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .nav-group { display: flex; gap: 10px; }
    .micro-admin {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      border-bottom: 1px dotted rgba(255,255,255,0.28);
      line-height: 1;
      padding-bottom: 2px;
      margin-left: 8px;
      user-select: none;
    }
    .micro-admin:hover { color: #FD6453; border-bottom-color: rgba(253,100,83,0.7); }
    .btn {
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #fff;
      padding: 10px 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .btn.primary { border-color: #FD6453; background: #FD6453; color: #080808; }
    .btn[aria-pressed="true"] { border-color: #FD6453; background: rgba(253,100,83,0.2); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status-line { font-size: 12px; color: rgba(255,255,255,0.7); min-height: 18px; }
    .result-panel {
      margin-top: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0f0f0f;
      padding: 16px;
    }
    .result-panel pre {
      margin-top: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: rgba(255,255,255,0.88);
    }
    .result-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .processing-wrap {
      margin-top: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.86);
    }
    .processing-moons {
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 24px;
      line-height: 1;
    }
    .moon-phase {
      opacity: 0.35;
      transform: scale(0.92);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .moon-phase.active {
      opacity: 1;
      transform: scale(1.12);
    }
    .processing-caption {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.02em;
    }
    .astro-sign-name {
      margin-top: 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 6.4vw, 58px);
      line-height: 1;
      letter-spacing: 0.04em;
      color: #FD6453;
    }
    .progress-track {
      margin: 6px 0 14px;
      width: min(320px, 100%);
      height: 3px;
      background: rgba(255,255,255,0.08);
    }
    .progress-fill {
      height: 100%;
      width: 0;
      background: #FD6453;
      transition: width 0.22s ease;
    }
    .followup-area {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.08);
      animation: fadeIn 0.25s ease;
    }
    .clarify-area {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .clarify-input {
      width: 100%;
      margin-top: 10px;
      min-height: 92px;
      resize: vertical;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
      font-family: inherit;
    }
    .clarify-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    .clarify-input:focus {
      outline: none;
      border-color: rgba(253,100,83,0.7);
      box-shadow: 0 0 0 1px rgba(253,100,83,0.25);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.25; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .score-breakdown {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .score-cell {
      border: 1px solid rgba(255,255,255,0.1);
      background: #101010;
      padding: 12px;
      text-align: center;
    }
    .score-cell .sc-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }
    .score-cell .sc-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #FD6453;
    }
    .flag-list {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .flag-tag {
      font-size: 12px;
      padding: 5px 10px;
      border: 1px solid rgba(253,100,83,0.4);
      background: rgba(253,100,83,0.08);
      color: #FD6453;
      letter-spacing: 0.04em;
    }
    .subtag-tag {
      font-size: 12px;
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.04em;
    }
    .intro-copy {
      font-family: 'Roboto', sans-serif;
      font-size: clamp(24px, 3.8vw, 42px);
      line-height: 1.35;
      font-weight: 100;
      max-width: 860px;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }
    .intro-copy p + p {
      margin-top: 16px;
    }
    .intro-nav {
      margin-top: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .intro-arrow {
      border: 1px solid rgba(255,255,255,0.2);
      background: #101010;
      color: #fff;
      font-size: 20px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .intro-arrow:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .intro-step {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-left: 6px;
    }
    .merge-note {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(253,180,50,0.4);
      background: rgba(253,180,50,0.08);
      color: rgba(253,220,100,0.95);
      font-size: 14px;
      line-height: 1.5;
    }
    .admin-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
      padding: 18px;
    }
    .admin-modal-backdrop.open { display: flex; }
    .admin-modal {
      width: min(420px, 100%);
      border: 1px solid rgba(255,255,255,0.18);
      background: #101010;
      padding: 16px;
    }
    .admin-modal input {
      width: 100%;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #0d0d0d;
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
    }
    .admin-modal-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .admin-modal-status {
      margin-top: 8px;
      min-height: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
    }
    @media (max-width: 760px) {
      body { padding: 24px 14px 88px; }
      .nav-row { flex-direction: column; align-items: stretch; }
      .nav-group { width: 100%; }
      .btn { flex: 1; }
      .option-list.usage-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 520px) {
      .option-list.usage-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <img class="gale-wordmark" src="608c6a3b589f3737b86b883c_GALE%20Logo.svg" alt="GALE">
    <div class="meta-row">
      <span><span class="ai-copper">AI</span> SKILLS - FOCUS CONTENT CALIBRATION</span>
      <span id="saveStatus">Not saved yet</span>
    </div>
    <section id="slideSection">
      <div id="slideIndex" class="slide-index">Loading</div>
      <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
      <div class="preview-wrap" id="slideCard"></div>
      <div class="nav-row">
        <div class="status-line"><span id="statusLine"><span class="gale-a">A</span>I flow active</span><span class="micro-admin" id="adminLink">Admin</span></div>
        <div class="nav-group">
          <button class="btn" id="backBtn" type="button">Back</button>
          <button class="btn primary" id="nextBtn" type="button">Next</button>
        </div>
      </div>
    </section>
  </main>
  <div class="admin-modal-backdrop" id="adminModalBackdrop" role="dialog" aria-modal="true" aria-label="Admin Access">
    <div class="admin-modal">
      <div class="style-label-tag">Admin Access</div>
      <div class="style-body">Enter password to open dashboard.</div>
      <input id="adminModalPassword" type="password" autocomplete="off" placeholder="Password" />
      <div class="admin-modal-actions">
        <button class="btn" type="button" id="adminModalCancel">Cancel</button>
        <button class="btn primary" type="button" id="adminModalOpen">Open</button>
      </div>
      <div class="admin-modal-status" id="adminModalStatus"></div>
    </div>
  </div>
  <script>
    var DRAFT_KEY = "galeQuizDraftV5";
    var SUBMISSION_KEY = "galeQuizSubmissionsV5";
    var SUBMISSION_API_ENDPOINT = "/api/submissions";
    var RESPONDENT_KEY_STORAGE = "galeQuizRespondentKeyV1";

    var coreQuestions = [
      {
        id: "q1", stage: "Core Skills", area: "Basic Usage",
        prompt: "On average, how often do you use AI tools like ChatGPT, Claude, or Copilot for work tasks?",
        mainOptions: [
          "All the time (daily or near-daily)",
          "Steadily week in, week out",
          "Erratically (bursts of high use with longer lapses)",
          "Sporadically (occasional, infrequent use)",
          "Rarely / just starting"
        ],
        signalMap: {
          "All the time (daily or near-daily)": 1,
          "Steadily week in, week out": 0.83,
          "Erratically (bursts of high use with longer lapses)": 0.5,
          "Sporadically (occasional, infrequent use)": 0.17,
          "Rarely / just starting": 0
        },
        followupTriggerValues: ["Rarely / just starting"],
        followup: {
          id: "q1a",
          prompt: "Which best describes where you are?",
          options: [
            { text: "I haven’t really had the chance to try AI tools yet", signal: 0 },
            { text: "I’ve tried them a couple of times but they didn’t stick", signal: 0.25 },
            { text: "I use them for personal stuff but not for work", signal: 0.5 }
          ]
        }
      },
      {
        id: "q2a", stage: "Core Skills", area: "Prompt Structure",
        prompt: "When you ask AI for important work output, do you usually provide structured instructions (goal, context, constraints, format) instead of a short one-line ask?",
        mainOptions: ["Yes", "Sometimes", "No"],
        followup: {
          id: "q2a1",
          prompt: "Which sounds most like your current prompting style?",
          options: [
            { text: "I usually keep prompts short and unstructured", signal: 0 },
            { text: "I add some detail, but not consistently", signal: 0.25 },
            { text: "I include some structure, but I’m still refining what works", signal: 0.5 }
          ]
        }
      },
      {
        id: "q3", stage: "Core Skills", area: "Iterative Refinement",
        prompt: "When AI gives you a weak result, do you rewrite your prompt — changing what you asked for or how you asked it — rather than just trying again?",
        mainOptions: ["Yes", "Sometimes", "No"],
        followup: {
          id: "q3a",
          prompt: "What do you usually do with a bad result?",
          options: [
            { text: "I usually accept the first result or stop there", signal: 0 },
            { text: "I retry sometimes, but mostly with minor wording tweaks", signal: 0.25 },
            { text: "I intentionally revise instructions/context, but not consistently", signal: 0.5 }
          ]
        }
      },
      {
        id: "q4", stage: "Core Skills", area: "Document & Data Work",
        prompt: "Have you given AI a document, spreadsheet, or dataset and used the output in actual work — not just tested it?",
        followup: {
          id: "q4a",
          prompt: "Which is closest?",
          options: [
            { text: "I didn’t realize AI could work well with files/data for this", signal: 0 },
            { text: "I’ve tried once or twice, but it’s not repeatable yet", signal: 0.25 },
            { text: "I can do this in limited cases, but not consistently", signal: 0.5 }
          ]
        }
      },
      {
        id: "q5", stage: "Core Skills", area: "Multi-Step Prompting",
        prompt: "Have you intentionally broken a complex task into multiple prompt steps — feeding the output from one step into the next — to get a better result?",
        followup: {
          id: "q5a",
          prompt: "Which sounds most like you?",
          options: [
            { text: "I usually keep it to one prompt and one output", signal: 0 },
            { text: "I split tasks into steps occasionally, but ad hoc", signal: 0.25 },
            { text: "I break work into steps deliberately, but inconsistently", signal: 0.5 }
          ]
        }
      },
      {
        id: "q6", stage: "Core Skills", area: "Automation & Integration",
        prompt: "Have you connected AI to other tools or workflows — through APIs, automation platforms like Zapier or Make, or custom code?",
        followup: {
          id: "q6a",
          prompt: "Which is closest?",
          options: [
            { text: "I haven’t connected AI to other tools yet", signal: 0 },
            { text: "I’ve experimented, but nothing reliable is running", signal: 0.25 },
            { text: "I’ve built simple integrations, but not robust recurring workflows", signal: 0.5 }
          ]
        }
      }
    ];

    var usageOptionHelp = {
      "Quick one-shot answers": "Use cases: direct questions, quick clarifications, and rapid context checks.",
      "Quality assurance / output review": "Use cases: checking quality, spotting errors, and improving tone/clarity before sharing.",
      "Research synthesis": "Use cases: summarizing sources, extracting themes, and condensing long research into key takeaways.",
      "Data analysis": "Use cases: interpreting trends, comparing segments, and generating insights from structured data.",
      "Strategic planning (what to execute)": "Use cases: evaluating options, setting priorities, and deciding what direction to execute.",
      "Project planning (how to execute)": "Use cases: creating timelines, sequencing tasks, and assigning execution checkpoints.",
      "Calculation / computation": "Use cases: summarize metrics, compute growth rates, estimate budget scenarios.",
      "Coding / software development": "Use cases: writing/debugging code, generating tests, and explaining technical approaches.",
      "Workflow automation": "Use cases: repeatable multi-step workflows, triggered actions, and cross-tool handoffs.",
      "Creative content generation": "Use cases: drafting copy, concepting assets, and generating campaign creative.",
      "Communication / messaging": "Use cases: emails, stakeholder updates, and adapting messaging for different audiences.",
      "Idea generation / brainstorming": "Use cases: generating concepts, naming ideas, and exploring creative directions."
    };

    function usageHelpFor(optionLabel) {
      return usageOptionHelp[optionLabel] || "Use case examples vary by role and team workflow.";
    }

    function renderUsageOptionLabel(optionLabel) {
      var text = String(optionLabel || "");
      var match = text.match(/^(.*)\s\((.*)\)$/);
      if (!match) {
        return '<span class="usage-label-main">' + escapeHtml(text) + '</span>';
      }
      return '' +
        '<span class="usage-label-main">' + escapeHtml(match[1]) + '</span>' +
        '<span class="usage-label-sub">(' + escapeHtml(match[2]) + ')</span>';
    }

    var usageAreas = [
      "Quick one-shot answers",
      "Quality assurance / output review",
      "Research synthesis",
      "Data analysis",
      "Strategic planning (what to execute)",
      "Project planning (how to execute)",
      "Calculation / computation",
      "Coding / software development",
      "Workflow automation",
      "Creative content generation",
      "Communication / messaging",
      "Idea generation / brainstorming"
    ];

    var usageLabelAliases = {
      "Q and A": "Quick one-shot answers",
      "Question answering / general chat": "Quick one-shot answers",
      "Research": "Research synthesis",
      "Analytics": "Data analysis",
      "Strategy": "Strategic planning (what to execute)",
      "Strategic planning": "Strategic planning (what to execute)",
      "Project management / planning": "Project planning (how to execute)",
      "Computation": "Calculation / computation",
      "Automation": "Workflow automation",
      "Content Creation": "Creative content generation",
      "Content drafting & generation": "Creative content generation",
      "Communication": "Communication / messaging",
      "Ideation": "Idea generation / brainstorming"

        } else if (ans === "Sometimes") {

          if (fuAns) {
            q.followup.options.forEach(function(opt) {
              if (opt.text === fuAns) {
                if (typeof opt.signal === "number") {
                  var normalizedSignal = Math.max(0, Math.min(0.5, opt.signal));
                  pts = Math.round((normalizedSignal * weight) * 10) / 10;
                } else {
                  var normalized = Math.max(0, Math.min(1, opt.points / 1.5));
                  pts = Math.round((normalized * weight * 0.65) * 10) / 10;
                }
              }
            });
          }
          breakdown[q.id] = pts;
          total += pts;
        } else {
          breakdown[q.id] = 0;
        }

        if (q.id === "q1" && ans === "Rarely / just starting") {
          var q1Followup = state.responses[q.followup.id];
          if (q1Followup) {
            q.followup.options.forEach(function(opt) {
              if (opt.text === q1Followup) {
                var q1Pts = 0;
                if (typeof opt.signal === "number") {
                  q1Pts = Math.round((Math.max(0, Math.min(0.5, opt.signal)) * weight) * 10) / 10;
                } else {
                  var q1Normalized = Math.max(0, Math.min(1, opt.points / 1.5));
                  q1Pts = Math.round((q1Normalized * weight * 0.65) * 10) / 10;

          ],

        }
      };

      function pick(list, offset) {

      var scoreData = computeScore();

    function submitResults() {
      var scoreData = computeScore();
      var tier = computeTier(scoreData.total);
      var flags = computeFlags(tier.name);
      var subtags = computeSubtags();
      var respondentKey = getRespondentKey();
      var payload = {
        submittedAt: new Date().toISOString(),
        respondentKey: respondentKey,
        score: scoreData.total,
        scoreBreakdown: scoreData.breakdown,
        tier: tier.name,
        tierLabel: tier.label,
        tierDesc: tier.desc,
        flags: flags,
        subtags: subtags,
        mergeRecommendation: false,
        responses: state.responses
      };
      payload.aiProfile = buildAiAstrologyRead(payload);
      var existing = getStoredSubmissions();
      var localIndex = existing.findIndex(function(entry) {
        return entry && entry.respondentKey === respondentKey;
      });
      if (localIndex >= 0) {
        existing[localIndex] = payload;
      } else {
        existing.push(payload);
        localIndex = existing.length - 1;
      }
      localStorage.setItem(SUBMISSION_KEY, JSON.stringify(existing));

      /* Recompute merge recommendation now that this submission is stored */
      var shouldMerge = computeMergeRecommendation();
      payload.mergeRecommendation = shouldMerge;
      /* Update the stored copy with the recommendation */
      existing[localIndex].mergeRecommendation = shouldMerge;
      localStorage.setItem(SUBMISSION_KEY, JSON.stringify(existing));

      sendSubmissionToApi(payload)
        .then(function(resp) {
          if (resp && resp.id) {
            payload.remoteId = resp.id;
            existing[localIndex].remoteId = resp.id;
            if (resp.replaced) {
              existing[localIndex].replaced = true;
            }
            localStorage.setItem(SUBMISSION_KEY, JSON.stringify(existing));
          }
        })
        .catch(function(err) {
          console.error("Remote submission failed:", err);
        });

      state.lastResult = payload;
      saveDraft();
      return payload;
    }

    function csvEscape(value) {
      var str = value == null ? "" : String(value);
      if (/[",\n]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
      return str;
    }

    function downloadTextFile(filename, content, contentType) {
      var blob = new Blob([content], { type: contentType });
      var url = URL.createObjectURL(blob);
      var anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function getStoredSubmissions() {
      var parsed = JSON.parse(localStorage.getItem(SUBMISSION_KEY) || "[]");
      return Array.isArray(parsed) ? parsed : [];
    }

    function sendSubmissionToApi(payload) {
      return fetch(SUBMISSION_API_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(function(res) {
        if (!res.ok) {
          return res.json().catch(function() { return {}; }).then(function(errBody) {
            var message = errBody && errBody.error ? errBody.error : "Submission API request failed";
            throw new Error(message);
          });
        }
        return res.json().catch(function() { return {}; });
      });
    }

        slideIndex.style.display = "flex";
      }

      if (s === "intro") {
        nextBtn.textContent = state.introStep >= introSlides.length - 1 ? "Start Quiz" : "Continue";
        renderIntro();
      } else if (s === "astro") {
        nextBtn.textContent = "Submit";
        renderAstrology();
      } else if (s === "summary") {
        nextBtn.textContent = "Submitted";
        nextBtn.disabled = true;
        renderSummary();
      } else if (usageMap[s]) {
        nextBtn.textContent = "Next";
        renderUsageQuestion(usageMap[s]);
      } else if (coreMap[s]) {
        nextBtn.textContent = "Next";
        renderCoreQuestion(coreMap[s]);
      } else if (calMap[s]) {
        nextBtn.textContent = "Next";
        renderCalibration(calMap[s]);
      } else if (sigMap[s]) {
        nextBtn.textContent = "Next";
        renderSignal(sigMap[s]);
      } else if (domainMap[s]) {
        nextBtn.textContent = "Next";
        renderDomainQuestion(domainMap[s]);
      }

      wireInteractions();
      updateProgress();
    }

    function wireInteractions() {
      slideCard.onclick = null;
      if (state.currentSlide === "intro") {
        slideCard.onclick = function(evt) {
          if (evt.target.closest('[data-intro-action]')) return;
          goToNextSlide(true);
        };
      } else if (state.currentSlide !== "summary") {
        slideCard.onclick = function(evt) {
          if (evt.target.closest('.option-btn, .check-item, textarea, input, button, [data-intro-action], [data-astro-feedback], [data-edit-resubmit]')) return;
          if (isSlideAnswered(state.currentSlide)) {
            goToNextSlide(true);
          }
        };
      }

      slideCard.querySelectorAll("[data-intro-action]").forEach(function(btn) {
        btn.addEventListener("click", function(evt) {
          evt.stopPropagation();
          var action = btn.getAttribute("data-intro-action");
          if (action === "prev") {
            if (state.introStep > 0) {
              state.introStep -= 1;
              saveDraft();
              render();
            }
            return;
          }
          goToNextSlide(true);
        });
      });

      slideCard.querySelectorAll(".option-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var qid = btn.getAttribute("data-qid");
          var val = decodeURIComponent(btn.getAttribute("data-val"));

          var core = coreMap[qid];
          if (core) {
            var old = state.responses[qid];
            state.responses[qid] = val;
            if (old && old !== val) {
              delete state.responses[core.followup.id];
            }
            var needsFollowup = Array.isArray(core.followupTriggerValues)
              ? core.followupTriggerValues.indexOf(val) >= 0
              : val === "No";
            if (!needsFollowup) {
              delete state.responses[core.followup.id];
            }
            state.lastResult = null;
            saveDraft();
            render();
            return;
          }

          var parentCore = coreQuestions.find(function(q) { return q.followup.id === qid; });
          if (parentCore) {
            state.responses[qid] = val;
            state.lastResult = null;
            saveDraft();
            render();
            return;
          }

          if (calMap[qid] && calMap[qid].type !== "multi") {
            state.responses[qid] = val;
            state.lastResult = null;
            saveDraft();
            render();
            return;
          }

          if (domainMap[qid]) {
            state.responses[qid] = val;
            state.lastResult = null;
            saveDraft();
            render();
            return;
          }
        });
      });

      slideCard.querySelectorAll(".check-item[data-qid]").forEach(function(item) {
        item.addEventListener("click", function(evt) {
          if (evt.target && evt.target.closest('.help-trigger')) return;
          var qid = item.getAttribute("data-qid");
          var val = decodeURIComponent(item.getAttribute("data-val"));
          var usageQuestion = isUsageQuestionId(qid);
          var current = usageQuestion
            ? normalizeUsageList(state.responses[qid])
            : (Array.isArray(state.responses[qid]) ? state.responses[qid].slice() : []);
          var exists = current.indexOf(val) >= 0;
          var updated;
          var isNoneOption = /^None of these/i.test(val);

          if (isNoneOption) {
            updated = exists ? [] : [val];
          } else {
            if (qid === "s2" && !exists && current.length >= 2) {
              statusLine.textContent = "Select up to 2 options for this question.";
              return;
            }
            updated = exists ? current.filter(function(x) { return x !== val; }) : current.concat([val]);
            updated = updated.filter(function(e) { return !/^None of these/i.test(e); });
          }

          if (usageQuestion) {
            updated = normalizeUsageList(updated);
          }

          if (qid === "q2") {
            state.responses.q2 = updated;
            var q2bCurrent = Array.isArray(state.responses.q2b) ? state.responses.q2b : [];
            state.responses.q2b = normalizeUsageList(q2bCurrent).filter(function(choice) {
              return updated.indexOf(choice) >= 0;
            });
            var q2cCurrent = Array.isArray(state.responses.q2c) ? state.responses.q2c : [];
            state.responses.q2c = normalizeUsageList(q2cCurrent).filter(function(choice) {
              return updated.indexOf(choice) < 0;
            });
          } else if (qid === "q2b" || qid === "q2c") {
            var q2Selected = normalizeUsageList(state.responses.q2);
            if (qid === "q2b") {
              state.responses[qid] = updated.filter(function(choice) {
                return q2Selected.indexOf(choice) >= 0;
              });
            } else {
              state.responses[qid] = updated.filter(function(choice) {
                return q2Selected.indexOf(choice) < 0;
              });
            }
          } else {
            state.responses[qid] = updated;
          }
          state.lastResult = null;
          saveDraft();
          render();
        });
      });

      slideCard.querySelectorAll(".clarify-input[data-clarify-qid]").forEach(function(input) {
        input.addEventListener("input", function() {
          var qid = input.getAttribute("data-clarify-qid");
          state.responses[noteKeyFor(qid)] = input.value;
          state.lastResult = null;
          saveDraft();
        });
      });

      slideCard.querySelectorAll(".clarify-input[data-domain-specialty]").forEach(function(input) {
        input.addEventListener("input", function() {
          state.responses.d1_specialty = input.value;
          state.lastResult = null;
          saveDraft();
        });
      });

      slideCard.querySelectorAll("[data-edit-resubmit]").forEach(function(btn) {
        btn.addEventListener("click", function() {
          state.lastResult = null;
          state.astroReadyAt = 0;
          state.currentSlide = questionSlideIds[0];
          state.history = [];
          saveDraft();
          render();
          statusLine.textContent = "Update any answers and submit again; your previous response will be replaced.";
        });
      });

      slideCard.querySelectorAll("[data-astro-feedback]").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var choice = btn.getAttribute("data-astro-feedback");
          state.responses.astro_feedback_choice = choice;
          if (choice !== "not_quite") {
            delete state.responses.astro_feedback_note;
          }
          state.lastResult = null;
          saveDraft();
          render();
        });
      });

      slideCard.querySelectorAll("[data-astro-feedback-note]").forEach(function(input) {
        input.addEventListener("input", function() {
          state.responses.astro_feedback_note = input.value;
          saveDraft();
        });
      });

      var jsonBtn = document.getElementById("downloadJsonBtn");
      if (jsonBtn) {
        jsonBtn.addEventListener("click", function() {
          downloadJsonSubmissions();
          statusLine.textContent = "JSON export downloaded.";
        });
      }
      var csvBtn = document.getElementById("downloadCsvBtn");
      if (csvBtn) {
        csvBtn.addEventListener("click", function() {
          downloadCsvSubmissions();
          if (getStoredSubmissions().length) statusLine.textContent = "CSV export downloaded.";
        });
      }
    }

    function updateProgress() {
      var total = TOTAL_QUESTIONS;
      var answered = 0;
      usageQuestions.forEach(function(q) {
        var v = state.responses[q.id];
        if (Array.isArray(v) && v.length > 0) answered++;
      });
      coreQuestions.forEach(function(q) {
        if (isSlideAnswered(q.id)) answered++;
      });
      calibrationQuestions.forEach(function(q) {
        if (q.type === "multi") {
          var c = state.responses[q.id];
          if (Array.isArray(c) && c.length > 0) answered++;
        } else if (state.responses[q.id]) {
          answered++;
        }
      });
      signalQuestions.forEach(function(q) {
        var v = state.responses[q.id];
        if (Array.isArray(v) && v.length > 0) answered++;
      });
      if (state.responses.d1) answered++;
      var pct = Math.round((answered / total) * 100);
      progressFill.style.width = Math.min(100, Math.max(0, pct)) + "%";
    }

    function goToNextSlide(skipCheck) {
      if (state.currentSlide === "intro" && state.introStep < introSlides.length - 1) {
        state.introStep += 1;
        saveDraft();
        render();
        return;
      }
      if (state.currentSlide === "summary") return;
      if (!skipCheck && !isSlideAnswered(state.currentSlide)) {
        statusLine.textContent = "Please answer before continuing.";
        return;
      }
      statusLine.textContent = "";
      var next = getNextSlide(state.currentSlide);
      state.history.push(state.currentSlide);
      state.currentSlide = next;
      if (next === "summary" && !state.lastResult) {
        state.lastResult = submitResults();
      } else {
        saveDraft();
      }
      render();
    }

    backBtn.addEventListener("click", function() {
      if (state.currentSlide === "intro" && state.introStep > 0) {
        state.introStep -= 1;
        saveDraft();
        render();
        return;
      }
      if (!state.history.length) return;
      state.currentSlide = state.history.pop();
      saveDraft();
      render();
    });

    nextBtn.addEventListener("click", function() {
      goToNextSlide(false);
    });

    document.addEventListener("keydown", function(evt) {
      if (state.currentSlide !== "intro") return;
      if (evt.repeat) return;
      if (evt.key === "Shift" || evt.key === "Control" || evt.key === "Alt" || evt.key === "Meta") return;
      goToNextSlide(true);
    });

    if (adminLink) {
      adminLink.addEventListener("click", function() {
        openAdminModal();
      });
    }
    if (adminModalCancel) {
      adminModalCancel.addEventListener("click", function() {
        closeAdminModal();
      });
    }
    if (adminModalOpen) {
      adminModalOpen.addEventListener("click", function() {
        tryAdminAccess();
      });
    }
    if (adminModalPassword) {
      adminModalPassword.addEventListener("keydown", function(evt) {
        if (evt.key === "Enter") tryAdminAccess();
        if (evt.key === "Escape") closeAdminModal();
      });
    }
    if (adminModalBackdrop) {
      adminModalBackdrop.addEventListener("click", function(evt) {
        if (evt.target === adminModalBackdrop) closeAdminModal();
      });
    }

    loadDraft();
    render();
  </script>
</body>
</html>
