<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>GALE Quiz App</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&family=Roboto:wght@100&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 36px 24px 100px;
    }
    .app-shell { max-width: 980px; margin: 0 auto; }
    .gale-wordmark {
      width: 112px;
      height: auto;
      margin-bottom: 28px;
      display: block;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .ai-copper { color: #FD6453; }
    .gale-a {
      display: inline-block;
      color: #FD6453;
      font-weight: 600;
      letter-spacing: 0.02em;
      position: relative;
      padding-right: 1px;
    }
    .gale-a::after {
      content: '';
      position: absolute;
      left: 1px;
      right: 1px;
      top: 52%;
      height: 1px;
      background: #080808;
      opacity: 0.9;
    }
    .slide-index {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #FD6453;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slide-index::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      background: #FD6453;
    }
    #saveStatus {
      display: none;
    }
    .preview-wrap {
      background: #080808;
      border: 1px solid rgba(255,255,255,0.09);
      padding: clamp(24px, 5vw, 56px);
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }
    .watermark-num {
      position: absolute;
      bottom: 16px;
      right: 24px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(58px, 14vw, 120px);
      color: #fff;
      opacity: 0.05;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    .accent-bar { width: 40px; height: 2px; background: #FD6453; margin-bottom: 18px; }
    .style-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 6vw, 84px);
      letter-spacing: 0.04em;
      line-height: 0.95;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .style-section {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(30px, 4vw, 60px);
      letter-spacing: 0.04em;
      line-height: 0.95;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .style-label-tag {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #FD6453;
      margin-bottom: 10px;
    }
    .style-body {
      font-size: 16px;
      font-weight: 300;
      line-height: 1.65;
      color: rgba(255,255,255,0.95);
      max-width: 760px;
    }
    .option-list {
      margin-top: 24px;
      display: grid;
      gap: 10px;
      max-width: 760px;
    }
    .option-list.usage-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      max-width: 920px;
    }
    .usage-option-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .usage-label {
      flex: 1;
      min-width: 0;
    }
    .usage-label-main { display: block; }
    .usage-label-sub {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      font-style: italic;
      color: rgba(255,255,255,0.72);
      line-height: 1.35;
    }
    .help-wrap {
      position: relative;
      flex: 0 0 auto;
    }
    .help-trigger {
      border: 1px solid rgba(255,255,255,0.26);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.9);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      cursor: help;
      padding: 0;
    }
    .help-popover {
      position: absolute;
      right: 0;
      top: 24px;
      width: min(280px, 72vw);
      border: 1px solid rgba(255,255,255,0.22);
      background: #121212;
      color: rgba(255,255,255,0.92);
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: 0.01em;
      padding: 8px 10px;
      z-index: 30;
      display: none;
      text-transform: none;
    }
    .help-wrap:hover .help-popover,
    .help-wrap:focus-within .help-popover {
      display: block;
    }
    .option-btn,
    .check-item {
      border: 1px solid rgba(255,255,255,0.14);
      background: #101010;
      color: #fff;
      padding: 14px 16px;
      text-align: left;
      font-size: 15px;
      line-height: 1.45;
      transition: border-color 0.2s ease, background-color 0.2s ease;
      cursor: pointer;
      width: 100%;
    }
    .option-btn[aria-pressed="true"],
    .check-item.active {
      border-color: #FD6453;
      background: rgba(253,100,83,0.14);
    }
    @media (hover: hover) and (pointer: fine) {
      .option-btn:hover,
      .check-item:hover {
        border-color: rgba(253,100,83,0.75);
        background: rgba(253,100,83,0.08);
      }
    }
    .check-item input { margin-right: 10px; accent-color: #FD6453; }
    .check-item label { cursor: pointer; display: flex; align-items: flex-start; }
    .nav-row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .nav-group { display: flex; gap: 10px; }
    .micro-admin {
      appearance: none;
      border: 0;
      background: transparent;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      border-bottom: 1px dotted rgba(255,255,255,0.28);
      line-height: 1;
      padding-bottom: 2px;
      margin-left: 8px;
      user-select: none;
    }
    .micro-admin:hover,
    .micro-admin:focus-visible {
      color: #FD6453;
      border-bottom-color: rgba(253,100,83,0.7);
      outline: none;
    }
    .btn {
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #fff;
      padding: 10px 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .btn.primary { border-color: #FD6453; background: #FD6453; color: #080808; }
    .btn[aria-pressed="true"] { border-color: #FD6453; background: rgba(253,100,83,0.2); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status-line {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      min-height: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
    }
    .status-attention {
      color: #FD6453;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .micro-admin-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .result-panel {
      margin-top: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0f0f0f;
      padding: 16px;
    }
    .result-panel pre {
      margin-top: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: rgba(255,255,255,0.88);
    }
    .result-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .processing-wrap {
      margin-top: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.86);
    }
    .processing-moons {
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 24px;
      line-height: 1;
    }
    .moon-phase {
      opacity: 0.35;
      transform: scale(0.92);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .moon-phase.active {
      opacity: 1;
      transform: scale(1.12);
    }
    .processing-caption {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.02em;
    }
    .astro-sign-name {
      margin-top: 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 6.4vw, 58px);
      line-height: 1;
      letter-spacing: 0.04em;
      color: #FD6453;
    }
    .astro-card {
      margin-top: 14px;
      border: 1px solid rgba(253,100,83,0.35);
      background: linear-gradient(180deg, rgba(253,100,83,0.1), rgba(253,100,83,0.02) 28%, rgba(255,255,255,0.02));
      border-radius: 10px;
      padding: clamp(16px, 2.4vw, 24px);
    }
    .astro-ascii {
      margin: 0 0 12px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.28);
      border-radius: 6px;
      max-width: 100%;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      line-height: 1.2;
      white-space: pre;
      color: rgba(255,255,255,0.93);
    }
    .astro-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
      min-width: 0;
    }
    .astro-emoji {
      font-size: clamp(32px, 6vw, 52px);
      line-height: 1;
      margin-bottom: 0;
      filter: drop-shadow(0 6px 20px rgba(253,100,83,0.2));
    }
    .astro-sign-name {
      margin-top: 0;
      font-size: clamp(44px, 7.4vw, 72px);
      line-height: 1.05;
      letter-spacing: 0.035em;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .astro-signature {
      margin-top: 10px;
      font-size: clamp(17px, 2vw, 21px);
      line-height: 1.7;
      color: rgba(255,255,255,0.96);
      max-width: 820px;
    }
    .astro-meta {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .astro-chip {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.03);
      padding: 5px 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
    }
    .astro-lines {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }
    .astro-line {
      font-size: clamp(15px, 1.65vw, 18px);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
      border-left: 2px solid rgba(253,100,83,0.55);
      padding-left: 10px;
    }
    .astro-label {
      display: inline-block;
      min-width: 118px;
      font-weight: 700;
      color: #FFD1CA;
      letter-spacing: 0.01em;
    }
    .section-progress {
      margin: 6px 0 14px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-progress-segment {
      height: 6px;
      background: rgba(255,255,255,0.08);
      flex-basis: 0;
      flex-grow: 1;
      overflow: hidden;
    }
    .section-progress-fill {
      height: 100%;
      width: 0;
      background: #FD6453;
      transition: width .25s ease;
    }
    #progressInterest {
      background: #FDCB40;
    }
    #progressFeedback {
      background: #A280FF;
    }
    .astro-progress-marker {
      position: relative;
      flex: 0 0 auto;
      width: 24px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      opacity: 0.55;
      filter: saturate(0.9);
      transition: transform 0.22s ease, opacity 0.22s ease, filter 0.22s ease;
      user-select: none;
    }
    .astro-progress-marker.active {
      opacity: 1;
      transform: translateY(-1px) scale(1.05);
      filter: drop-shadow(0 0 8px rgba(162,128,255,0.6));
    }
    .astro-progress-sparkles {
      position: absolute;
      left: 50%;
      bottom: 14px;
      width: 28px;
      height: 18px;
      transform: translateX(-50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .astro-progress-marker.active .astro-progress-sparkles {
      opacity: 1;
    }
    .astro-progress-sparkle {
      position: absolute;
      font-size: 10px;
      line-height: 1;
      color: #FDF2C6;
      opacity: 0;
      transform: translateY(4px) scale(0.8);
      animation: astroSparkle 1.1s ease-in-out infinite;
    }
    .astro-progress-sparkle:nth-child(1) {
      left: 2px;
      bottom: 2px;
      animation-delay: 0s;
    }
    .astro-progress-sparkle:nth-child(2) {
      left: 11px;
      bottom: 8px;
      animation-delay: 0.22s;
    }
    .astro-progress-sparkle:nth-child(3) {
      right: 2px;
      bottom: 3px;
      animation-delay: 0.44s;
    }
    @keyframes astroSparkle {
      0%, 100% {
        opacity: 0;
        transform: translateY(4px) scale(0.75);
      }
      35% {
        opacity: 1;
        transform: translateY(-1px) scale(1);
      }
      70% {
        opacity: 0.65;
        transform: translateY(-5px) scale(0.9);
      }
    }
    .followup-area {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.08);
      animation: fadeIn 0.25s ease;
    }
    .clarify-area {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .clarify-input {
      width: 100%;
      margin-top: 10px;
      min-height: 92px;
      resize: vertical;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
      font-family: inherit;
    }
    .clarify-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    .clarify-input:focus {
      outline: none;
      border-color: rgba(253,100,83,0.7);
      box-shadow: 0 0 0 1px rgba(253,100,83,0.25);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.25; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .score-breakdown {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .score-cell {
      border: 1px solid rgba(255,255,255,0.1);
      background: #101010;
      padding: 12px;
      text-align: center;
    }
    .score-cell .sc-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }
    .score-cell .sc-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #FD6453;
    }
    .flag-list {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .flag-tag {
      font-size: 12px;
      padding: 5px 10px;
      border: 1px solid rgba(253,100,83,0.4);
      background: rgba(253,100,83,0.08);
      color: #FD6453;
      letter-spacing: 0.04em;
    }
    .subtag-tag {
      font-size: 12px;
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.04em;
    }
    .intro-copy {
      font-family: 'Roboto', sans-serif;
      font-size: clamp(24px, 3.8vw, 42px);
      line-height: 1.35;
      font-weight: 100;
      max-width: 860px;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      min-height: var(--intro-copy-min-height, 0px);
    }
    .intro-copy p + p {
      margin-top: 16px;
    }
    .intro-copy .intro-subnote {
      display: block;
      font-size: 0.52em;
      line-height: 1.25;
      letter-spacing: 0.04em;
      margin-top: 12px;
    }
    .intro-nav {
      margin-top: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .intro-arrow {
      border: 1px solid rgba(255,255,255,0.2);
      background: #101010;
      color: #fff;
      font-size: 20px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .intro-arrow:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .intro-step {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-left: 6px;
    }
    .option-list.two-col {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      max-width: 920px;
    }
    .other-input-wrap {
      margin-top: 14px;
      max-width: 640px;
    }
    .other-input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
      font-family: inherit;
    }
    .other-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    .other-input:focus {
      outline: none;
      border-color: rgba(253,100,83,0.7);
      box-shadow: 0 0 0 1px rgba(253,100,83,0.25);
    }
    .merge-note {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(253,180,50,0.4);
      background: rgba(253,180,50,0.08);
      color: rgba(253,220,100,0.95);
      font-size: 14px;
      line-height: 1.5;
    }
    .admin-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
      padding: 18px;
    }
    .admin-modal-backdrop.open { display: flex; }
    .admin-modal {
      width: min(420px, 100%);
      border: 1px solid rgba(255,255,255,0.18);
      background: #101010;
      padding: 16px;
    }
    .admin-modal input {
      width: 100%;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #0d0d0d;
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
    }
    .admin-modal-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .admin-modal-status {
      margin-top: 8px;
      min-height: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
    }
    @media (max-width: 760px) {
      body { padding: 24px 14px 88px; }
      .nav-row { flex-direction: column; align-items: stretch; }
      .nav-group { width: 100%; }
      .btn { flex: 1; }
      .option-list.usage-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .astro-title-row { gap: 8px; align-items: flex-start; }
      .astro-sign-name { font-size: clamp(26px, 7.2vw, 38px); letter-spacing: 0.02em; }
      .astro-emoji { font-size: clamp(28px, 7vw, 40px); }
      .astro-ascii { font-size: 9px; }
    }
    @media (max-width: 520px) {
      .option-list.usage-grid { grid-template-columns: 1fr; }
      .option-list.two-col { grid-template-columns: 1fr; }
    }
    .logo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }
    .logo-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100px;
      min-height: 90px;
      padding: 14px 8px 10px;
      background: #141414;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      gap: 8px;
    }
    .logo-tile:hover { border-color: rgba(253,100,83,0.5); background: #1a1a1a; }
    .logo-tile.active { border-color: #FD6453; background: rgba(253,100,83,0.08); }
    .logo-tile img { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; }
    .logo-tile .logo-fallback {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;

        state.responses.t1c = filterToolFollowupSelections(state.responses.t1c, state.responses.t1, T1C_NONE_OPTION);
        var savedSlide = typeof parsed.currentSlide === "string" ? parsed.currentSlide : "intro";

        state.introStep = typeof parsed.introStep === "number"

    function computeScore() {
      var total = 0;
      var breakdown = {};
      var coreWeights = {
        q1: 2,
        q2a: 2,
        q3: 3,
        q4: 2.5,
        qv1: 2.4
      };

      coreQuestions.forEach(function(q) {
        var ans = state.responses[q.id];
        var weight = coreWeights[q.id] || 1;
        if (q.signalMap && typeof q.signalMap[ans] === "number") {
          var mapped = Math.max(0, Math.min(1, q.signalMap[ans]));
          var mappedPts = Math.round((mapped * weight) * 10) / 10;
          breakdown[q.id] = mappedPts;
          total += mappedPts;
        } else if (ans === "Yes") {
          breakdown[q.id] = weight;
          total += weight;
        } else if (ans === "Sometimes") {
          var half = Math.round((weight * 0.5) * 10) / 10;
          breakdown[q.id] = half;
          total += half;
        } else if (ans === "No") {
          var fuAns = state.responses[q.followup.id];
          var pts = 0;
          if (fuAns) {
            q.followup.options.forEach(function(opt) {
              if (opt.text === fuAns) {
                if (typeof opt.signal === "number") {
                  var normalizedSignal = Math.max(0, Math.min(0.5, opt.signal));
                  pts = Math.round((normalizedSignal * weight) * 10) / 10;
                } else {
                  var normalized = Math.max(0, Math.min(1, opt.points / 1.5));
                  pts = Math.round((normalized * weight * 0.65) * 10) / 10;
                }
              }
            });
          }
          breakdown[q.id] = pts;
          total += pts;
        } else {
          breakdown[q.id] = 0;
        }

        if (q.id === "q1" && ans === "Rarely / not yet") {
          var q1Followup = state.responses[q.followup.id];
          if (q1Followup) {
            q.followup.options.forEach(function(opt) {
              if (opt.text === q1Followup) {
                var q1Pts = 0;
                if (typeof opt.signal === "number") {
                  q1Pts = Math.round((Math.max(0, Math.min(0.5, opt.signal)) * weight) * 10) / 10;
                } else {
                  var q1Normalized = Math.max(0, Math.min(1, opt.points / 1.5));
                  q1Pts = Math.round((q1Normalized * weight * 0.65) * 10) / 10;
                }
                total += q1Pts - (breakdown[q.id] || 0);
                breakdown[q.id] = q1Pts;
              }
            });
          }
        }

        if (q.id === "q2a") {
          var needsQ2aFollowup = Array.isArray(q.followupTriggerValues) && q.followupTriggerValues.indexOf(ans) >= 0;
          var q2aFollowup = state.responses[q.followup.id];
          if (needsQ2aFollowup && q2aFollowup) {
            q.followup.options.forEach(function(opt) {
              if (opt.text === q2aFollowup) {
                var q2aPts = 0;
                if (typeof opt.signal === "number") {
                  q2aPts = Math.round((Math.max(0, Math.min(0.5, opt.signal)) * weight) * 10) / 10;
                } else {
                  var q2aNormalized = Math.max(0, Math.min(1, opt.points / 1.5));
                  q2aPts = Math.round((q2aNormalized * weight * 0.65) * 10) / 10;
                }
                total += q2aPts - (breakdown[q.id] || 0);
                breakdown[q.id] = q2aPts;
              }
            });
          }
        }
      });

      var q2Used = Array.isArray(state.responses.q2) ? state.responses.q2 : [];
      var q2Comfort = normalizeUsageList(state.responses.q2b);
      var comfortScore = Math.min(3.2, q2Comfort.length * 0.55);
      var usageBreadthScore = Math.min(1.8, q2Used.length * 0.2);
      var q2ProfileScore = Math.round((comfortScore + usageBreadthScore) * 10) / 10;
      breakdown.q2_profile = q2ProfileScore;
      total += q2ProfileScore;

      var c1Map = {
        "Just getting started — still figuring out what to use it for": 0,
        "Dabbling — I use it for some things, mostly the basics": 0.6,
        "Comfortable — it's part of my regular workflow": 1.2,
        "Building — I'm making things with it (prompts, workflows, tools, code)": 1.9,
        "Deep end — agents, APIs, vibe coding, the works": 2.5
      };
      var c1Score = c1Map[state.responses.c1] || 0;
      breakdown.c1_readiness = c1Score;
      total += c1Score;

      var tools = normalizeToolList(state.responses.t1).filter(function(tool) { return tool !== "Other"; });
      var toolBreadthScore = Math.min(2.2, tools.length * 0.2);
      var advancedToolScore = 0;
      if (tools.indexOf("ALCHEMY AI") >= 0) advancedToolScore += 0.25;
      if (tools.indexOf("Cursor / Claude Code / other coding tools") >= 0) advancedToolScore += 0.35;
      if (tools.indexOf("NotebookLM") >= 0) advancedToolScore += 0.2;
      if (tools.indexOf("Perplexity") >= 0) advancedToolScore += 0.15;
      if (tools.indexOf("Midjourney") >= 0 || tools.indexOf("Weavy") >= 0) advancedToolScore += 0.15;
      advancedToolScore = Math.min(0.9, advancedToolScore);
      var t1Score = Math.round((toolBreadthScore + advancedToolScore) * 10) / 10;
      breakdown.t1_tool_profile = t1Score;
      total += t1Score;

      var s1 = Array.isArray(state.responses.s1) ? state.responses.s1 : [];
      var s0 = Array.isArray(state.responses.s0) ? state.responses.s0 : [];
      var s0Map = {
        "Media brief or creative brief": 0.7,
        "Competitive or market research synthesis": 0.8,
        "Campaign reporting or performance summary": 0.8,
        "Audience segmentation or persona draft": 0.7,
        "None of these yet": 0
      };
      var s0Pts = 0;
      s0.forEach(function(opt) {
        if (s0Map[opt]) s0Pts += s0Map[opt];
      });
      total += Math.min(2.0, s0Pts);

      var s1Map = {
        "Use role/context-rich prompts (beyond basic ask/answer)": 0.6,
        "Use AI with documents or data to produce analysis or recommendations": 1.2,
        "Turn AI output into deliverables shared with others": 1.2,
        "Use AI as part of recurring workflows": 0.8,
        "Connect AI to other tools or automations": 1.6,
        "Write code that calls AI APIs": 1.8,
        "Build custom tools/apps powered by AI": 2.2
      };
      var s1Pts = 0;
      s1.forEach(function(opt) {
        if (s1Map[opt]) s1Pts += s1Map[opt];
      });
      total += Math.min(4.0, s1Pts);

      return { total: Math.round(total * 10) / 10, breakdown: breakdown };
    }

    function computeTier(score) {
      if (score >= 21) {
        return {
          name: "Tier 1",
          label: "Advanced: ready to fully integrate rich experience into GALE systems",
          desc: "Strong evidence of advanced application, automation depth, and reliable quality controls"
        };
      }
      if (score >= 14) {
        return {
          name: "Tier 2",
          label: "Ready to expand current use cases",
          desc: "Consistent practical usage with room to scale into stronger cross-team and system-level workflows"
        };
      }
      return {
        name: "Tier 3",
        label: "Foundational: ready to apply core workflows",
        desc: "Best fit for foundational skill-building and repeatable quality habits before advanced system-level expansion"
      };
    }

    function scoreMeaningText(score) {
      var n = Number(score || 0);
      if (n >= 21) {
        return "21.0+ maps to Tier 1 (Advanced): systems-level application and strong quality controls.";
      }
      if (n >= 14) {
        return "14.0–20.9 maps to Tier 2 (Intermediate): consistent practical use with room to scale.";
      }
      return "Below 14.0 maps to Tier 3 (Foundational): build repeatable core workflows and quality habits.";
    }

    function tierTrackRecommendation(tierName) {
      if (tierName === "Tier 1") return "Advanced builder track";
      if (tierName === "Tier 2") return "Applied acceleration track";
      return "Foundational enablement track";
    }

    function toTierNumber(tierName) {
      var map = { "Tier 1": 3, "Tier 2": 2, "Tier 3": 1 };
      return map[tierName] || 0;
    }

    function computeFlags(tierName) {
      var flags = [];
      var a = state.responses;
      var tierNum = toTierNumber(tierName);

      var blockers = Array.isArray(a.blockers) ? a.blockers : [];
      var verifyChoice = a.qv1 || "";

      if (blockers.indexOf("My prompts don't get great results") >= 0) {
        flags.push("Prioritize prompt quality coaching");

    function buildAiAstrologyRead(result) {
      var responses = (result && result.responses) || {};

      var formats = Array.isArray(responses.q15) ? responses.q15 : [];
      var verificationChoice = responses.qv1 || "";

      var domain = responses.d1 || "Generalist Orbit";
      var q2Used = Array.isArray(responses.q2) ? responses.q2 : [];

      var blockerCount = blockers.filter(function(opt) {

        blockers.join("|"),
        topics.join("|"),
        formats.join("|")

      var score = Number(result && result.score || 0);

      var chaosCount = blockers.indexOf("Can't tell if the output is good") < 0 ? 1 : 0;

      if (q2Used.indexOf("Image, video, or design generation") >= 0) modeScores[2] += 2;

      if (q2Used.indexOf("Brainstorming and ideation") >= 0) modeScores[2] += 2;

      var modeIndex = 4;

      var minModeThreshold = readinessIndex === 0 ? 1 : 2;
      if (maxModeScore >= minModeThreshold) {

        var minQualifying = maxModeScore;
        modeScores.forEach(function(scoreVal) {

      localStorage.setItem(SUBMISSION_KEY, JSON.stringify(existing));

      /* Recompute merge recommendation now that this submission is stored */
      var shouldMerge = computeMergeRecommendation();
      payload.mergeRecommendation = shouldMerge;
      /* Update the stored copy with the recommendation */
      existing[localIndex].mergeRecommendation = shouldMerge;
      localStorage.setItem(SUBMISSION_KEY, JSON.stringify(existing));

      sendSubmissionToApi(payload)
        .then(function(resp) {
          if (resp && resp.id) {
            payload.remoteId = resp.id;
            existing[localIndex].remoteId = resp.id;
            if (resp.replaced) {
              existing[localIndex].replaced = true;
            }
            localStorage.setItem(SUBMISSION_KEY, JSON.stringify(existing));
          }
        })
        .catch(function(err) {
          console.error("Remote submission failed:", err);
        });

      state.lastResult = payload;
      saveDraft();
      return payload;
    }

    function csvEscape(value) {
      var str = value == null ? "" : String(value);
      if (/[",\n]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
      return str;
    }

    function downloadTextFile(filename, content, contentType) {
      var blob = new Blob([content], { type: contentType });
      var url = URL.createObjectURL(blob);
      var anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function getStoredSubmissions() {
      var parsed = JSON.parse(localStorage.getItem(SUBMISSION_KEY) || "[]");
      return Array.isArray(parsed) ? parsed : [];

    function sendSubmissionToApi(payload) {
      return fetch(SUBMISSION_API_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(function(res) {
        if (!res.ok) {
          return res.json().catch(function() { return {}; }).then(function(errBody) {
            var message = errBody && errBody.error ? errBody.error : "Submission API request failed";
            throw new Error(message);
          });
        }
        return res.json().catch(function() { return {}; });
      });
    }

              : '<button class="btn" type="button" data-astro-feedback="nailed_it" aria-pressed="false">Nailed It!</button>') +
            '<button class="btn" type="button" data-astro-feedback="not_quite" aria-pressed="' + notQuiteActive + '">Not quite</button>' +
          '</div>' +
          (notQuiteActive ?
            '<div class="clarify-area" style="margin-top:10px;">' +
              '<div class="style-label-tag">Tell us what missed</div>' +
              '<textarea class="clarify-input" data-astro-feedback-note="true" placeholder="Optional: what felt off or what should be emphasized?">' + escapeHtml(astroNote) + '</textarea>' +
            '</div>' :
            '') +
        '</div>';

      statusLine.textContent = "If needed, select Not quite and add a note. Then click Next to submit.";
    }

    function renderSummary() {
      slideIndex.textContent = "Submitted";
      if (!state.lastResult) state.lastResult = submitResults();

      slideCard.innerHTML =
        '<span class="watermark-num">DONE</span>' +
        '<div class="accent-bar"></div>' +
        '<div class="style-display">Thank You</div>' +
        '<div class="style-section">Submission Received</div>' +
        '<div class="style-body">Your responses were submitted successfully. We will use them to plan practical AI training tracks across GALE.</div>' +
        '<div class="result-panel">' +
          '<div class="style-label-tag">What Happens Next</div>' +
          '<div class="style-body">The training team reviews responses in aggregate and maps participants into learning groups. Individual readiness placement is shared through training coordination, not this form.</div>' +
          '<div class="result-actions"><button class="btn" type="button" data-edit-resubmit="true">Edit Answers & Resubmit</button></div>' +
        '</div>';

      statusLine.textContent = "Submission complete. Use Edit Answers & Resubmit if you need to make changes.";
    }

    function render() {
      nextBtn.disabled = false;
      backBtn.disabled = state.currentSlide === "intro" ? state.introStep === 0 : state.history.length === 0;
      var s = state.currentSlide;

      if (s !== "intro") {
        slideIndex.style.display = "flex";
      }

      if (s === "intro") {
        nextBtn.textContent = state.introStep >= introSlides.length - 1 ? "Start Quiz" : "Continue";
        renderIntro();
      } else if (s === "section_interest" || s === "section_feedback") {
        nextBtn.textContent = "Continue";
        renderSectionIntro(s);
      } else if (s === "astro") {
        nextBtn.textContent = "Submit";
        renderAstrology();
      } else if (s === "summary") {
        nextBtn.textContent = "Submitted";
        nextBtn.disabled = true;
        renderSummary();
      } else if (usageMap[s]) {
        nextBtn.textContent = "Next";
        renderUsageQuestion(usageMap[s]);
      } else if (coreMap[s]) {
        nextBtn.textContent = "Next";
        renderCoreQuestion(coreMap[s]);
      } else if (calMap[s] && calMap[s].type === "logo-multi") {
        nextBtn.textContent = "Next";
        renderLogoQuestion(calMap[s]);
      } else if (calMap[s]) {
        nextBtn.textContent = "Next";
        renderCalibration(calMap[s]);
      } else if (sigMap[s]) {
        nextBtn.textContent = "Next";
        renderSignal(sigMap[s]);
      } else if (domainMap[s]) {
        nextBtn.textContent = "Next";
        renderDomainQuestion(domainMap[s]);
      }

      wireInteractions();
      updateProgress();
    }

    function showCopyToast() {
      var existing = document.querySelector(".copy-toast");
      if (existing) existing.remove();
      var toast = document.createElement("div");
      toast.className = "copy-toast";
      toast.textContent = "Copied to clipboard";
      document.body.appendChild(toast);
      setTimeout(function() {
        if (toast && toast.parentNode) toast.parentNode.removeChild(toast);
      }, 1600);
    }

    function wireInteractions() {
      slideCard.onclick = null;
      if (state.currentSlide === "intro") {
        slideCard.onclick = function(evt) {
          if (Date.now() < state.suppressAutoAdvanceUntil) return;
          if (evt.target.closest('[data-intro-action]')) return;
          goToNextSlide(true);
        };
      } else if (state.currentSlide !== "summary" && state.currentSlide !== "astro") {
        slideCard.onclick = function(evt) {
          if (Date.now() < state.suppressAutoAdvanceUntil) return;
          if (evt.target.closest('.option-btn, .check-item, textarea, input, button, [data-intro-action], [data-astro-feedback], [data-edit-resubmit]')) return;
          if (isSlideAnswered(state.currentSlide)) {
            goToNextSlide(true);
          }
        };
      }

      slideCard.querySelectorAll("[data-intro-action]").forEach(function(btn) {
        btn.addEventListener("click", function(evt) {
          evt.stopPropagation();
          var action = btn.getAttribute("data-intro-action");
          if (action === "prev") {
            if (state.introStep > 0) {
              state.introStep -= 1;
              saveDraft();
              render();
            }
            return;
          }
          goToNextSlide(true);
        });
      });

      slideCard.querySelectorAll("[data-section-next]").forEach(function(btn) {
        btn.addEventListener("click", function(evt) {
          evt.preventDefault();
          evt.stopPropagation();
          goToNextSlide(true);
        });
      });

      slideCard.querySelectorAll(".option-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var qid = btn.getAttribute("data-qid");
          var val = decodeURIComponent(btn.getAttribute("data-val"));

          var core = coreMap[qid];
          if (core) {
            var old = state.responses[qid];
            state.responses[qid] = val;
            if (core.followup && old && old !== val) {
              delete state.responses[core.followup.id];
            }
            var needsFollowup = !!core.followup && (
              Array.isArray(core.followupTriggerValues)
                ? core.followupTriggerValues.indexOf(val) >= 0
                : val === "No"
            );
            if (core.followup && !needsFollowup) {
              delete state.responses[core.followup.id];
            }
            state.lastResult = null;
            saveDraft();
            render();
            return;
          }

          var parentCore = coreQuestions.find(function(q) { return q.followup && q.followup.id === qid; });
          if (parentCore) {
            state.responses[qid] = val;
            state.lastResult = null;
            saveDraft();
            render();
            return;
          }

          if (calMap[qid] && calMap[qid].type !== "multi") {
            state.responses[qid] = val;
            state.lastResult = null;
            saveDraft();
            render();
            return;
          }

          if (domainMap[qid] || qid === "d1_subdomain") {
            if (qid === "d1") {
              var oldDomain = state.responses.d1;
              state.responses.d1 = val;
              if (oldDomain && oldDomain !== val) {
                delete state.responses.d1_subdomain;
                delete state.responses[otherTextKey("d1")];
              }
              if (val !== "Other") delete state.responses[otherTextKey("d1")];
            } else if (qid === "d1_subdomain") {
              state.responses.d1_subdomain = val;
            } else {
              state.responses[qid] = val;
            }
            state.lastResult = null;
            saveDraft();
            render();
            return;
          }
        });
      });

      slideCard.querySelectorAll(".check-item[data-qid]").forEach(function(item) {
        item.addEventListener("click", function(evt) {
          if (evt.target && evt.target.closest('.help-trigger')) return;
          var qid = item.getAttribute("data-qid");
          var val = decodeURIComponent(item.getAttribute("data-val"));
          var usageQuestion = isUsageQuestionId(qid);
          var current = usageQuestion
            ? (qid === "q2b"
              ? normalizeQ2bList(state.responses[qid])
              : (qid === "q2c" ? normalizeQ2cList(state.responses[qid]) : normalizeUsageList(state.responses[qid])))
            : (Array.isArray(state.responses[qid]) ? state.responses[qid].slice() : []);
          var exists = current.indexOf(val) >= 0;
          var updated;
          var isNoneOption = /^None of these/i.test(val);

          if (isNoneOption) {
            updated = exists ? [] : [val];
          } else {
            updated = exists ? current.filter(function(x) { return x !== val; }) : current.concat([val]);
            updated = updated.filter(function(e) { return !/^None of these/i.test(e); });
          }

          if (usageQuestion) {
            updated = qid === "q2b"
              ? normalizeQ2bList(updated)
              : (qid === "q2c" ? normalizeQ2cList(updated) : normalizeUsageList(updated));
          }

          if (qid === "t1") {
            state.responses.t1 = normalizeToolList(updated);
            state.responses.t1b = filterToolFollowupSelections(state.responses.t1b, state.responses.t1, T1B_NONE_OPTION);
            state.responses.t1d = filterToolDiscoverySelections(state.responses.t1d, getUnselectedToolsInMasterOrder());
            state.responses.t1c = filterToolFollowupSelections(state.responses.t1c, state.responses.t1, T1C_NONE_OPTION);
          } else if (qid === "t1b") {
            state.responses.t1b = filterToolFollowupSelections(updated, state.responses.t1, T1B_NONE_OPTION);
          } else if (qid === "t1d") {
            state.responses.t1d = filterToolDiscoverySelections(updated, getUnselectedToolsInMasterOrder());
          } else if (qid === "t1c") {
            state.responses.t1c = filterToolFollowupSelections(updated, state.responses.t1, T1C_NONE_OPTION);
          } else if (qid === "q2") {
            state.responses.q2 = updated;
            state.responses.q2b = filterQ2bSelections(state.responses.q2b, updated);
            state.responses.q2c = filterQ2cSelections(state.responses.q2c, updated);
          } else if (qid === "q2b" || qid === "q2c") {
            var q2Selected = normalizeUsageList(state.responses.q2);
            if (qid === "q2b") {
              state.responses[qid] = filterQ2bSelections(updated, q2Selected);
            } else {
              state.responses[qid] = filterQ2cSelections(updated, q2Selected);
            }
          } else {
            state.responses[qid] = updated;
          }
          if (qid === "program_topics" && updated.indexOf("Other") < 0) {
            delete state.responses[otherTextKey("program_topics")];
          }
          state.lastResult = null;
          saveDraft();
          render();
        });
      });

      slideCard.querySelectorAll(".other-input[data-other-qid]").forEach(function(input) {
        input.addEventListener("input", function() {
          var qid = input.getAttribute("data-other-qid");
          state.responses[otherTextKey(qid)] = input.value;
          state.lastResult = null;
          saveDraft();
        });
      });

      slideCard.querySelectorAll(".clarify-input[data-clarify-qid]").forEach(function(input) {
        input.addEventListener("input", function() {
          var qid = input.getAttribute("data-clarify-qid");
          state.responses[noteKeyFor(qid)] = input.value;
          state.lastResult = null;
          saveDraft();
        });
      });

      slideCard.querySelectorAll(".clarify-input[data-domain-specialty]").forEach(function(input) {
        input.addEventListener("input", function() {
          state.responses.d1_specialty = input.value;
          state.lastResult = null;
          saveDraft();
        });
      });

      slideCard.querySelectorAll("[data-open-text-qid]").forEach(function(input) {
        input.addEventListener("input", function() {
          var qid = input.getAttribute("data-open-text-qid");
          state.responses[qid] = input.value;
          state.lastResult = null;
          saveDraft();
        });
      });

      slideCard.querySelectorAll("[data-open-pair-qid][data-open-pair-key]").forEach(function(input) {
        input.addEventListener("input", function() {
          var qid = input.getAttribute("data-open-pair-qid");
          var key = input.getAttribute("data-open-pair-key");
          state.responses[qid + "_" + key] = input.value;
          state.lastResult = null;
          saveDraft();
        });
      });

      slideCard.querySelectorAll("[data-edit-resubmit]").forEach(function(btn) {
        btn.addEventListener("click", function() {
          state.lastResult = null;
          state.astroReadyAt = 0;
          state.currentSlide = questionSlideIds[0];
          state.history = [];
          saveDraft();
          render();
          statusLine.textContent = "Update any answers and submit again; your previous response will be replaced.";
        });
      });

      slideCard.querySelectorAll("[data-clear-domain]").forEach(function(btn) {
        btn.addEventListener("click", function() {
          delete state.responses.d1;
          delete state.responses.d1_subdomain;
          state.lastResult = null;
          saveDraft();
          render();
        });
      });

      slideCard.querySelectorAll("[data-astro-feedback]").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var choice = btn.getAttribute("data-astro-feedback");
          state.responses.astro_feedback_choice = choice;
          if (choice !== "not_quite") {
            delete state.responses.astro_feedback_note;
          }
          state.lastResult = null;
          saveDraft();
          render();
        });
      });

      slideCard.querySelectorAll("[data-astro-feedback-note]").forEach(function(input) {
        input.addEventListener("input", function() {
          state.responses.astro_feedback_note = input.value;
          saveDraft();
        });
      });

      slideCard.querySelectorAll("[data-astro-copy]").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var preview = buildAstrologyPreviewResult();
          var profile = buildAiAstrologyRead(preview);
          var text = profile.shareText || (profile.sign + "\n" + profile.signature);

          function fallbackCopy() {
            var tmp = document.createElement("textarea");
            tmp.value = text;
            tmp.setAttribute("readonly", "readonly");
            tmp.style.position = "absolute";
            tmp.style.left = "-9999px";
            document.body.appendChild(tmp);
            tmp.select();
            try {
              document.execCommand("copy");
              statusLine.textContent = "Persona copied. Paste it anywhere.";
              showCopyToast();
            } catch (e) {
              statusLine.textContent = "Copy failed — you can still select and copy manually.";
            }
            document.body.removeChild(tmp);
          }

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text)
              .then(function() {
                statusLine.textContent = "Persona copied. Paste it anywhere.";
                showCopyToast();
              })
              .catch(function() {
                fallbackCopy();
              });
          } else {
            fallbackCopy();
          }
        });
      });

      var jsonBtn = document.getElementById("downloadJsonBtn");
      if (jsonBtn) {
        jsonBtn.addEventListener("click", function() {
          downloadJsonSubmissions();
          statusLine.textContent = "JSON export downloaded.";
        });
      }
      var csvBtn = document.getElementById("downloadCsvBtn");
      if (csvBtn) {
        csvBtn.addEventListener("click", function() {
          downloadCsvSubmissions();
          if (getStoredSubmissions().length) statusLine.textContent = "CSV export downloaded.";
        });
      }
    }

    function updateProgress() {
      if (!progressAptitude || !progressInterest || !progressFeedback) return;

      var bySection = {
        aptitude: progressAptitude,
        interest: progressInterest,
        feedback: progressFeedback
      };
      var segments = {
        aptitude: segmentAptitude,
        interest: segmentInterest,
        feedback: segmentFeedback
      };
      var currentIdx = slideOrder.indexOf(state.currentSlide);
      if (currentIdx < 0) currentIdx = 0;

      sectionConfigs.forEach(function(section) {
        var total = section.questionIds.length || 1;
        var complete = 0;
        section.questionIds.forEach(function(qid) {
          var idx = slideOrder.indexOf(qid);
          if (idx >= 0 && idx <= currentIdx) complete += 1;
        });
        var pct = Math.round((complete / total) * 100);
        bySection[section.id].style.width = Math.min(100, Math.max(0, pct)) + "%";
        if (segments[section.id]) {
          segments[section.id].style.flexGrow = String(total);
        }
      });

      if (astroProgressMarker) {
        var astroIdx = slideOrder.indexOf("astro");
        var isAstroActive = state.currentSlide === "astro";
        var astroReached = astroIdx >= 0 && currentIdx >= astroIdx;
        astroProgressMarker.classList.toggle("active", isAstroActive);
        astroProgressMarker.style.opacity = astroReached ? "1" : "0.55";
      }
    }

    function goToNextSlide(skipCheck) {
      if (state.currentSlide === "intro" && state.introStep < introSlides.length - 1) {
        state.introStep += 1;
        saveDraft();
        render();
        return;
      }
      if (state.currentSlide === "summary") return;
      if (!skipCheck && !isSlideAnswered(state.currentSlide)) {
        if (state.currentSlide === "d1" && state.responses.d1 === "Other" && !getOtherText("d1")) {
          window.alert("Please enter your role before continuing.");
        }
        if (state.currentSlide === "program_topics" && isOtherChosen("program_topics") && !getOtherText("program_topics")) {
          window.alert("Please enter your other topic before continuing.");
        }
        if (state.currentSlide === "share_segment") {
          var segName = String(state.responses.share_segment_name || "").trim();
          var segIdea = String(state.responses.share_segment_idea || "").trim();
          if (segIdea && !segName) {
            statusLine.innerHTML = '<span class="status-attention">Please add your name if you entered an idea.</span>';
            return;
          }
        }
        statusLine.innerHTML = '<span class="status-attention">Please answer before continuing.</span>';
        return;
      }
      statusLine.textContent = "";
      var next = getNextSlide(state.currentSlide);
      if (next === "astro") {
        delete state.responses.astro_feedback_choice;
        delete state.responses.astro_feedback_note;
      }
      state.history.push(state.currentSlide);
      state.currentSlide = next;
      if (next === "summary" && !state.lastResult) {
        state.lastResult = submitResults();
      } else {
        saveDraft();
      }
      render();
    }

    backBtn.addEventListener("click", function(evt) {
      evt.preventDefault();
      evt.stopPropagation();
      state.suppressAutoAdvanceUntil = Date.now() + 350;
      if (state.currentSlide === "intro" && state.introStep > 0) {
        state.introStep -= 1;
        saveDraft();
        render();
        return;
      }
      if (!state.history.length) return;
      state.currentSlide = state.history.pop();
      saveDraft();
      render();
    });

    nextBtn.addEventListener("click", function() {
      goToNextSlide(false);
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        closeAdminModal();
        return;
      }
      var target = e.target;
      var isTypingTarget = !!(target && (
        target.closest("textarea, input, select, [contenteditable='true']") ||
        target.isContentEditable
      ));
      if (isTypingTarget) return;
      if (state.currentSlide === "astro") return;
      if (e.repeat) return;
      if (e.key === "Shift" || e.key === "Control" || e.key === "Alt" || e.key === "Meta") return;
      goToNextSlide(false);
    });

    if (resetResponsesBtn) {
      resetResponsesBtn.addEventListener("click", function() {
        resetResponsesWithConfirm();
      });
    }

    if (adminLink) {
      adminLink.addEventListener("click", function() {
        openAdminModal();
      });
    }
    if (adminModalCancel) {
      adminModalCancel.addEventListener("click", function() {
        closeAdminModal();
      });
    }
    if (adminModalOpen) {
      adminModalOpen.addEventListener("click", function() {
        tryAdminAccess();
      });
    }
    if (adminModalPassword) {
      adminModalPassword.addEventListener("keydown", function(evt) {
        if (evt.key === "Enter") tryAdminAccess();
        if (evt.key === "Escape") closeAdminModal();
      });
    }
    if (adminModalBackdrop) {
      adminModalBackdrop.addEventListener("click", function(evt) {
        if (evt.target === adminModalBackdrop) closeAdminModal();
      });
    }

    loadDraft();
    applyIntroCopyMinHeight();
    window.addEventListener("resize", applyIntroCopyMinHeight);
    loadPersonaGridConfig().then(function() {
      if (state.currentSlide === "astro") render();
    });
    render();
  </script>
</body>
</html>
